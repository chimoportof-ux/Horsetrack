{% extends 'base.html' %}
{% block title %}Formulario{% endblock %}
{% block content %}
<div class="card form-card">
    <h1>{{ title|default:'Formulario' }}</h1>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Guardar</button>
    </form>
</div>
{% endblock %}
