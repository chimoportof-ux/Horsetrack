{% extends 'base.html' %}
{% block title %}Eliminar{% endblock %}
{% block content %}
<div class="card form-card">
    <h1>Eliminar caballo</h1>
    <p>¿Seguro que quieres eliminar a <strong>{{ object.name }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Sí, eliminar</button>
        <a href="{% url 'horse_detail' object.pk %}" class="btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
