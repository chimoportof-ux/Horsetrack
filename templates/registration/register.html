{% extends 'base.html' %}
{% block title %}Registro{% endblock %}
{% block content %}
<div class="card auth-card">
    <h1>Crear cuenta</h1>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Crear cuenta</button>
    </form>
    <p>¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a></p>
</div>
{% endblock %}
